# Reconcile hooks: Per-host replication queue management
#
# Problem: When a host restarts during reconcile, its replication queue
# may accumulate entries and distributed sends may fail.
#
# Solution: Host-level hooks pause replication and distributed sends
# before each host is reconciled, and resume them after. These hooks
# run on every host individually (not once per cluster).
#
# Host hooks are defined at CHI level (spec.reconcile.host.hooks) and
# automatically inherited by all clusters.

apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: "hooks-replication"
spec:
  reconcile:
    host:
      hooks:
        pre:
          - sql:
              queries:
                - "SYSTEM STOP REPLICATION QUEUES"
                - "SYSTEM STOP DISTRIBUTED SENDS"
        post:
          - sql:
              queries:
                - "SYSTEM START REPLICATION QUEUES"
                - "SYSTEM START DISTRIBUTED SENDS"
  configuration:
    clusters:
      - name: "main"
        layout:
          shardsCount: 3
          replicasCount: 2
