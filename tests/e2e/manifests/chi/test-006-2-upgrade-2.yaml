apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: test-006-2
spec:
  templates:
    podTemplates:
    - name: default
      spec:
        containers:
        - name: clickhouse-pod
          image: clickhouse/clickhouse-server:25.8
  defaults:
    templates:
      podTemplate: default
  configuration:
    settings:
      # This MergeTree setting is only valid in ClickHouse 25.5+
      merge_tree/write_marks_for_substreams_in_compact_parts: "0"
    clusters:
    - name: default
      layout:
        replicasCount: 1
